version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: nl2build-postgres
    environment:
      POSTGRES_USER: nl2build
      POSTGRES_PASSWORD: nl2build
      POSTGRES_DB: nl2build
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nl2build"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: nl2build-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: nl2build-minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 3

  minio-init:
    image: minio/mc:latest
    container_name: nl2build-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set myminio http://minio:9000 minioadmin minioadmin;
      mc mb myminio/nl2build-artifacts --ignore-existing;
      mc anonymous set download myminio/nl2build-artifacts;
      exit 0;
      "

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nl2build-backend
    environment:
      DATABASE_URL: postgresql://nl2build:nl2build@postgres:5432/nl2build
      REDIS_URL: redis://redis:6379/0
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_BUCKET: nl2build-artifacts
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      LLM_MODEL: ${LLM_MODEL:-gpt-4-turbo-preview}
      KMS_PROVIDER: ${KMS_PROVIDER:-mock}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  worker-spec:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nl2build-worker-spec
    environment:
      DATABASE_URL: postgresql://nl2build:nl2build@postgres:5432/nl2build
      REDIS_URL: redis://redis:6379/0
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_BUCKET: nl2build-artifacts
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      LLM_MODEL: ${LLM_MODEL:-gpt-4-turbo-preview}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_started
    volumes:
      - ./backend:/app
    command: rq worker spec --url redis://redis:6379/0

  worker-codegen:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nl2build-worker-codegen
    environment:
      DATABASE_URL: postgresql://nl2build:nl2build@postgres:5432/nl2build
      REDIS_URL: redis://redis:6379/0
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_BUCKET: nl2build-artifacts
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_started
    volumes:
      - ./backend:/app
    command: rq worker codegen --url redis://redis:6379/0

  worker-build:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nl2build-worker-build
    environment:
      DATABASE_URL: postgresql://nl2build:nl2build@postgres:5432/nl2build
      REDIS_URL: redis://redis:6379/0
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_BUCKET: nl2build-artifacts
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_started
    volumes:
      - ./backend:/app
      - /var/run/docker.sock:/var/run/docker.sock
    command: rq worker build --url redis://redis:6379/0

  worker-sign:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nl2build-worker-sign
    environment:
      DATABASE_URL: postgresql://nl2build:nl2build@postgres:5432/nl2build
      REDIS_URL: redis://redis:6379/0
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_BUCKET: nl2build-artifacts
      KMS_PROVIDER: ${KMS_PROVIDER:-mock}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_started
    volumes:
      - ./backend:/app
    command: rq worker sign --url redis://redis:6379/0

  frontend:
    build:
      context: ./frontend/nl2build-ui
      dockerfile: Dockerfile
    container_name: nl2build-frontend
    environment:
      VITE_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend/nl2build-ui:/app
      - /app/node_modules
    command: npm run dev -- --host

volumes:
  postgres_data:
  redis_data:
  minio_data:

networks:
  default:
    name: nl2build-network
