name: Build Generated App

# Builds a generated Android project into a real debug APK using a managed
# Gradle (no wrapper jar needed) and the Android SDK preinstalled on the runner.
# - On push to main / claude/** it builds the checked-in sample at
#   examples/generated-sample (this is the proof that codegen output compiles).
# - Via workflow_dispatch it builds an arbitrary project path (used by the
#   backend build worker, which commits a generated project then dispatches this).

on:
  push:
    branches: [ main, 'claude/**' ]
  workflow_dispatch:
    inputs:
      project_path:
        description: "Path to the generated Android project"
        required: false
        default: "examples/generated-sample"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Gradle 8.2
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.2'

      - name: Resolve project path
        id: proj
        run: echo "path=${{ github.event.inputs.project_path || 'examples/generated-sample' }}" >> "$GITHUB_OUTPUT"

      - name: Build debug APK
        working-directory: ${{ steps.proj.outputs.path }}
        run: gradle assembleDebug --stacktrace

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: ${{ steps.proj.outputs.path }}/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
